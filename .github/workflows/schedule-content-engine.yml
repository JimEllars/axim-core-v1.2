name: Content Engine Automation

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  trigger-content-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Content Engine
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/axim-content-engine \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "action": "generate_news_batch",
              "source": "github_actions_automation",
              "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"
            }')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Content Engine triggered successfully"
          else
            echo "❌ Content Engine failed with status $http_code"
            echo "$body"
            exit 1
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Content Engine automation failed"
          echo "Check Edge Function logs: https://app.supabase.com/project/${{ secrets.SUPABASE_PROJECT_ID }}/logs/edge-functions"
