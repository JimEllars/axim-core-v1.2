name: Export Chatlogs to Google Drive

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '24'

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Google Drive Configuration
        run: |
          if [ -z "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" ]; then
            echo "❌ GOOGLE_DRIVE_CREDENTIALS secret not set"
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}" ]; then
            echo "❌ GOOGLE_DRIVE_FOLDER_ID secret not set"
            exit 1
          fi
          echo "✅ Google Drive secrets configured"

      - name: Export Chatlogs
        run: node scripts/export-chatlogs.js
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        timeout-minutes: 10

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: export-logs
          path: logs/
          retention-days: 7
