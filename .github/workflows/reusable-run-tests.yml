name: Reusable Test Runner

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Cloudflare Worker Dependencies
        run: cd cloudflare-workers && npm install

      - name: Run main project tests
        run: npm run test

      - name: Verify Build
        run: npm run build

      - name: Verify Cloudflare Worker Build

        run: npx wrangler deploy --dry-run -c cloudflare-workers/wrangler.toml
