name: Reusable Supabase Deployment

on:
  workflow_call:
    inputs:
      supabase-project-ref:
        description: 'The Supabase project reference'
        required: true
        type: string
    secrets:
      SUPABASE_ACCESS_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        run: npm install supabase@1.163.6

      - name: Deploy Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase functions deploy --no-verify --project-ref ${{ inputs.supabase-project-ref }}